<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background: subtle dark -->
  <rect width="400" height="120" rx="12" fill="#0f0f13"/>

  <!-- Connector lines (drawn first, behind nodes) -->
  <line x1="60" y1="60" x2="92" y2="32" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="96" y2="60" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="92" y2="88" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="24" y2="60" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="60" y1="60" x2="32" y2="34" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Pulse on center→right line -->
  <circle r="3" fill="#a78bfa" opacity="0.9">
    <animateMotion dur="1.8s" repeatCount="indefinite">
      <mpath>
        <path d="M60,60 L96,60"/>
      </mpath>
    </animateMotion>
  </circle>

  <!-- Satellite nodes -->
  <circle cx="96" cy="28" r="6" fill="url(#nodeGrad)" opacity="0.75"/>
  <circle cx="100" cy="60" r="6" fill="url(#nodeGrad)" opacity="0.75"/>
  <circle cx="96" cy="92" r="6" fill="url(#nodeGrad)" opacity="0.75"/>
  <circle cx="20" cy="60" r="5" fill="#4f46e5" opacity="0.5"/>
  <circle cx="28" cy="30" r="4" fill="#4f46e5" opacity="0.5"/>

  <!-- Center node -->
  <circle cx="60" cy="60" r="11" fill="url(#nodeGrad)" opacity="0.15"/>
  <circle cx="60" cy="60" r="8" fill="url(#nodeGrad)"/>
  <circle cx="60" cy="60" r="3" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text
    x="132"
    y="73"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="48"
    font-weight="700"
    letter-spacing="-1"
    fill="white">sema</text>

  <!-- Tagline -->
  <text
    x="133"
    y="92"
    font-family="'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="2.5"
    fill="#6366f1"
    opacity="0.85">SEMANTIC CODE INDEX</text>
</svg>
