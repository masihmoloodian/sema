name: Publish VS Code extension

# Publishes the extension to the VS Code Marketplace on a `vscode-v*` tag.
#
# One-time setup: add a repository secret named VSCE_PAT — an Azure DevOps
# Personal Access Token with the Marketplace > Manage scope
# (repo Settings -> Secrets and variables -> Actions -> New repository secret).
#
# Release flow (or just run scripts/release-vscode.sh):
#   bump vscode-extension/package.json, commit, then:
#   git tag vscode-v0.2.1 && git push origin vscode-v0.2.1

on:
  push:
    tags: ["vscode-v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Publish to the Marketplace
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
