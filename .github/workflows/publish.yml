name: Publish to PyPI

# Publishes sema-mcp to PyPI via Trusted Publishing (OIDC) — no API token stored.
#
# Release flow:
#   1. Bump `version` in pyproject.toml and commit.
#   2. git tag v0.1.1 && git push origin v0.1.1
#   3. This workflow builds and publishes that version.
#
# One-time setup on PyPI (pypi.org -> sema-mcp -> Settings -> Publishing):
#   add a GitHub trusted publisher with
#     owner=get-sema, repo=sema, workflow=publish.yml, environment=pypi

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sema-mcp/
    permissions:
      id-token: write # required to mint the OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI (Trusted Publishing — no token)
        run: uv publish --trusted-publishing always
